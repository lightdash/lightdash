volumes:
    node_modules:
    # When DB_SNAPSHOT_NAME is set (see okteto.preview.yaml), Okteto's webhook
    # diverts this volume to a copy-on-write clone of a pre-seeded snapshot
    # instead of a blank disk. Empty values deploy a normal blank volume.
    # csi-okteto is required: the default storage class can't restore snapshots.
    db-data:
        driver_opts:
            class: csi-okteto
            size: 2Gi
        labels:
            dev.okteto.com/from-snapshot-name: ${DB_SNAPSHOT_NAME:-}
            dev.okteto.com/from-snapshot-namespace: ${DB_SNAPSHOT_NAMESPACE:-}

# Okteto specific
endpoints:
    - path: /
      service: lightdash-preview
      port: 8080

services:
    db-preview:
        image: pgvector/pgvector:pg18
        restart: always
        environment:
            - POSTGRES_PASSWORD=${PGPASSWORD}
        ports:
            - '5432'
        volumes:
            - db-data:/var/lib/postgresql

    headless-browser:
        build:
            dockerfile: Dockerfile.headless-browser
        restart: always
        ports:
            - '3000'

    lightdash-preview:
        build:
            target: pr-runner
            context: ..
            dockerfile: dockerfile-prs
        depends_on:
            - db-preview
            - headless-browser
        healthcheck:
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s
            http:
                path: /api/v1/health
                port: 8080
        environment:
            # these were set in the dockerfile-prs container
            NODE_ENV: production
            IS_PULL_REQUEST: true
            LIGHTDASH_MODE: pr
            DBT_DEMO_DIR: /usr/app
            INTERNAL_LIGHTDASH_HOST: http://lightdash-preview:8080

            # This must be set in the GitHub Actions workflow
            SITE_URL: ${SITE_URL}

            # these were set in the render.yaml file
            PGMAXCONNECTIONS: 30
            SECURE_COOKIES: true
            TRUST_PROXY: true
            LIGHTDASH_SECRET: not very secret
            GROUPS_ENABLED: true
            EXTENDED_USAGE_ANALYTICS: true

            # these were set in the env.development file
            PGHOST: db-preview
            PGPORT: 5432
            PGDATABASE: postgres
            PGPASSWORD: ${PGPASSWORD}
            PGUSER: postgres
            HEADLESS_BROWSER_PORT: 3000
            HEADLESS_BROWSER_HOST: headless-browser
            S3_ACCESS_KEY: ${S3_ACCESS_KEY}
            S3_SECRET_KEY: ${S3_SECRET_KEY}
            S3_ENDPOINT: ${S3_ENDPOINT}
            S3_REGION: ${S3_REGION}
            S3_BUCKET: ${S3_BUCKET}
            MCP_ENABLED: true
            CUSTOM_ROLES_ENABLED: true
            # Enable service accounts in preview envs so the semantic-layer
            # connection page can generate project-scoped tokens. Sets the
            # health flag and (via LEGACY_ENABLE_ENV_VARS in parseConfig.ts)
            # the unified `service-accounts` feature flag.
            SERVICE_ACCOUNT_ENABLED: true

            # Enterprise Postgres wire protocol server for the semantic layer.
            # Setting the port starts the listener and lights up the "Semantic
            # layer" project settings page so the UI can be tested. NOTE: the
            # port is intentionally NOT published on the service (see `ports`
            # below) — Okteto's HTTP ingress can't route raw Postgres TCP, and
            # publishing a second port makes Okteto generate per-port endpoints
            # that break the default preview endpoint the e2e suite relies on.
            # The listener still binds inside the container, which is all the
            # UI needs to render.
            PGWIRE_PORT: 5433
            # Preview has no TLS certs; plaintext is fine inside the compose
            # network. Production requires PGWIRE_SSL_CERT_PATH/KEY_PATH.
            PGWIRE_SSL_MODE: disabled
            # Enables the combined timezone feature (incl. user-level timezone
            # resolution) so the timezone api-tests pass.
            LIGHTDASH_ENABLE_TIMEZONE_SUPPORT: true

            # Force-enable embedding flag in preview envs so e2e tests work.
            # Picked up via LEGACY_ENABLE_ENV_VARS in parseConfig.ts → unified
            # enabledFeatureFlags allowlist (step 1a).
            EMBEDDING_ENABLED: true

            # Force-enable feature flags in preview envs so their e2e specs
            # exercise the flag-on UX (dashboardFilterRequiredGroups.cy.ts).
            LIGHTDASH_ENABLE_FEATURE_FLAGS: dashboard-filter-requirements

            PERSISTENT_DOWNLOAD_URLS_ENABLED: true

            # these were set in https://dashboard.render.com/env-group/evg-cfn4dlhmbjst4ho7s160 but can be public
            SCHEDULER_ENABLED: true
            ALLOW_MULTIPLE_ORGS: true
            MICROSOFT_TEAMS_ENABLED: true

            # Debugging
            LIGHTDASH_LOG_LEVEL: debug
            LIGHTDASH_LOG_FORMAT: json

            # These were set in the render UI but are secret
            # these are set in the okteto admin UI - DO NOT SET THESE LOCALLY WHEN DEPLOYING or they will override the values in the okteto admin UI
            RUDDERSTACK_WRITE_KEY: ${RUDDERSTACK_WRITE_KEY}
            RUDDERSTACK_DATA_PLANE_URL: ${RUDDERSTACK_DATA_PLANE_URL}
            LIGHTDASH_LICENSE_KEY: ${LIGHTDASH_LICENSE_KEY}
            GITHUB_APP_ID: ${GITHUB_APP_ID}
            GITHUB_APP_NAME: ${GITHUB_APP_NAME}
            GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
            GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
            GITHUB_PRIVATE_KEY: ${GITHUB_PRIVATE_KEY}
            EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST}
            EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD}
            EMAIL_SMTP_SENDER_EMAIL: ${EMAIL_SMTP_SENDER_EMAIL}
            EMAIL_SMTP_USER: ${EMAIL_SMTP_SENDER_USER}
            DBT_CLOUD_ENVIRONMENT_ID: ${DBT_CLOUD_ENVIRONMENT_ID}
            DBT_CLOUD_BEARER_TOKEN: ${DBT_CLOUD_BEARER_TOKEN}
            BRANDFETCH_API_KEY: ${BRANDFETCH_API_KEY}
        ports:
            - '8080:8080'
        command: ['pnpm', 'start']
        entrypoint: ['/usr/bin/renderDeployHook.sh']
