<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Embedded AI Agent Explore Test</title>
        <style>
            body {
                margin: 0;
                font-family:
                    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
                    "Segoe UI", sans-serif;
                background: #f7f7f8;
                color: #1f2937;
            }

            main {
                display: grid;
                grid-template-rows: auto 1fr;
                min-height: 100vh;
            }

            form {
                display: grid;
                grid-template-columns: 1fr auto;
                gap: 12px;
                padding: 16px;
                border-bottom: 1px solid #d6d9df;
                background: #ffffff;
            }

            label {
                display: grid;
                gap: 6px;
                font-size: 13px;
                font-weight: 600;
            }

            input {
                width: 100%;
                box-sizing: border-box;
                border: 1px solid #b8bec8;
                border-radius: 6px;
                padding: 10px 12px;
                font: inherit;
            }

            button {
                align-self: end;
                border: 0;
                border-radius: 6px;
                padding: 10px 14px;
                font: inherit;
                font-weight: 600;
                color: #ffffff;
                background: #1f2937;
                cursor: pointer;
            }

            iframe {
                width: 100%;
                height: 100%;
                min-height: 720px;
                border: 0;
                background: #ffffff;
            }
        </style>
    </head>
    <body>
        <main>
            <form id="embed-form">
                <label>
                    AI agent embed URL
                    <input
                        id="embed-url"
                        type="url"
                        placeholder="Paste a generated /embed/.../ai-agents/... URL"
                    />
                </label>
                <button type="submit">Load</button>
            </form>
            <iframe id="embed-frame" title="Embedded AI agent"></iframe>
        </main>
        <script>
            const form = document.querySelector('#embed-form');
            const input = document.querySelector('#embed-url');
            const frame = document.querySelector('#embed-frame');

            form.addEventListener('submit', (event) => {
                event.preventDefault();
                frame.src = input.value;
            });
        </script>
    </body>
</html>
