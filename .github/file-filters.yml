# This is used by the action https://github.com/dorny/paths-filter

# Triggers preview environment deployment
preview:
  - "packages/**/*"
  - "docker/**/*"
  - "okteto.preview.yaml"

# Previews divert their database from a pre-seeded snapshot of main; PRs that
# change the seed data itself must migrate and seed from scratch instead
preview_db_full:
  - "examples/full-jaffle-shop-demo/**"
  - "packages/backend/src/database/seeds/**"
  - "packages/backend/src/ee/database/seeds/**"

cli:
  - "packages/cli/**/*"
  - "packages/e2e/cypress/cli/**/*"
  - "packages/common/**/*"

frontend:
  - "packages/frontend/**/*"
  - "packages/e2e/cypress/e2e/app/**/*"
  - "packages/common/**/*"

backend:
  - "packages/backend/**/*"
  - "packages/warehouses/**/*"
  - "packages/api-tests/**/*"
  - "packages/common/**/*"

api_schema:
  - "packages/backend/**/*"
  - "packages/common/**/*"

timezone:
  - "packages/frontend/src/components/common/TimeZonePicker/index.tsx"
  - "packages/common/src/types/timezone.ts"
