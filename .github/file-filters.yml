# This is used by the action https://github.com/dorny/paths-filter

# Triggers preview environment deployment
preview:
  - "packages/**/*"
  - "docker/**/*"
  - "okteto.preview.yaml"

cli:
  - "packages/cli/**/*"
  - "packages/common/**/*"

frontend:
  - "packages/frontend/**/*"
  - "packages/e2e/playwright/**/*"
  - "packages/e2e/playwright.config.ts"
  - "packages/e2e/tsconfig.json"
  - "packages/e2e/package.json"
  - "packages/common/**/*"

backend:
  - "packages/backend/**/*"
  - "packages/warehouses/**/*"
  - "packages/api-tests/**/*"
  - "packages/common/**/*"

api_schema:
  - "packages/backend/**/*"
  - "packages/common/**/*"

timezone:
  - "packages/frontend/src/components/common/TimeZonePicker/index.tsx"
  - "packages/common/src/types/timezone.ts"
  - "packages/e2e/playwright/app/dates.spec.ts"
