name: Data App E2B Template (manual)

# Manual operations on the Data App E2B sandbox template:
# - Initial bootstrap: publish a tag matching the currently running prod
#   version before the first release-driven build.
# - Emergency rebuilds without cutting a Lightdash release.
# - Personal dev experiments against a non-prod template.
#
# Release-driven builds run as part of post-release.yml. This workflow only
# fires on manual dispatch.
#
# Secrets required:
#   E2B_API_KEY — token for the E2B account that owns the target template.

on:
  workflow_dispatch:
    inputs:
      template_name:
        description: 'E2B template name to build'
        required: true
        default: 'lightdash-data-app'
      template_tag:
        description: 'Primary tag for this build'
        required: true
        default: 'manual'
      extra_tags:
        description: 'Comma-separated extra tags (optional)'
        required: false
        default: ''

concurrency:
  group: data-app-template-manual-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build E2B template
    runs-on: depot-ubuntu-24.04-4
    env:
      E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
      E2B_TEMPLATE_NAME: ${{ github.event.inputs.template_name }}
      E2B_TEMPLATE_TAG: ${{ github.event.inputs.template_tag }}
      E2B_TEMPLATE_EXTRA_TAGS: ${{ github.event.inputs.extra_tags }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Socket Firewall
        uses: socketdev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install root deps
        run: sfw pnpm install --frozen-lockfile --prefer-offline

      - name: Install sandbox deps
        working-directory: sandboxes/data-apps
        run: sfw pnpm install --frozen-lockfile --prefer-offline

      - name: Build & publish E2B template
        working-directory: sandboxes/data-apps
        run: pnpm run build
