name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  deployments: write
  contents: read
  pull-requests: write
  issues: write
  packages: write

jobs:
  # ============================================================================
  # Stage 0: Fast checks (no install needed)
  # ============================================================================
  check-exact-deps:
    name: Enforce Exact Dependency Versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check for range specifiers in package.json files
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const files = require('child_process')
            .execSync('find . -name package.json -not -path \"*/node_modules/*\"', { encoding: 'utf8' })
            .trim().split('\n');

          const issues = [];
          for (const f of files) {
            const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
            for (const section of ['dependencies', 'devDependencies', 'optionalDependencies']) {
              if (!pkg[section]) continue;
              for (const [name, ver] of Object.entries(pkg[section])) {
                if (ver.startsWith('workspace:')) continue;
                if (/^[\^~><=]/.test(ver) || ver.includes('||')) {
                  issues.push(f + ' [' + section + '] ' + name + ': ' + ver);
                }
              }
            }
            if (pkg.pnpm && pkg.pnpm.overrides) {
              for (const [key, ver] of Object.entries(pkg.pnpm.overrides)) {
                if (/^[\^~><=]/.test(ver) || ver.includes('||')) {
                  issues.push(f + ' [pnpm.overrides] ' + key + ': ' + ver);
                }
              }
            }
          }

          if (issues.length > 0) {
            console.error('ERROR: Found range specifiers in dependencies. All deps must use exact versions.');
            console.error('See: https://github.com/lightdash/lightdash/pull/21553');
            console.error('');
            issues.forEach(i => console.error('  ' + i));
            console.error('');
            console.error('Fix: use exact versions (e.g. \"1.2.3\" not \"^1.2.3\"). The .npmrc save-exact=true');
            console.error('setting ensures pnpm add uses exact versions by default.');
            process.exit(1);
          }

          console.log('All ' + files.length + ' package.json files use exact dependency versions.');
          "

  # ============================================================================
  # Stage 1: Build, lint, typecheck, and test
  # ============================================================================
  build-and-test:
    name: Build & Test
    runs-on: depot-ubuntu-24.04-8
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_API: https://cache.depot.dev
      NODE_OPTIONS: "--max-old-space-size=8192"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Socket Firewall
        uses: socketdev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
      - name: Install packages
        run: sfw pnpm install --frozen-lockfile --prefer-offline
      - name: Build
        run: pnpm build
      - name: Run quality checks in parallel
        run: |
          pnpm lint & pid_lint=$!
          pnpm format & pid_format=$!
          pnpm -F frontend unused-exports & pid_unused=$!
          pnpm typecheck & pid_typecheck=$!
          fail=0
          wait $pid_lint || fail=1
          wait $pid_format || fail=1
          wait $pid_unused || fail=1
          wait $pid_typecheck || fail=1
          exit $fail
      - name: Run unit tests
        run: pnpm test

  # ============================================================================
  # Stage 2: Deploy preview environment (only if stage 1 passes)
  # ============================================================================
  files-changed:
    name: Select Tests to Run
    runs-on: depot-ubuntu-24.04-4
    outputs:
      preview: ${{ steps.changes.outputs.preview == 'true' || contains(github.event.pull_request.body, 'deploy-preview') || contains(github.event.pull_request.body, 'test-all') }}
      frontend: ${{ steps.changes.outputs.frontend == 'true' || contains(github.event.pull_request.body, 'test-frontend') || contains(github.event.pull_request.body, 'test-all') }}
      backend: ${{ steps.changes.outputs.backend == 'true' || contains(github.event.pull_request.body, 'test-backend') || contains(github.event.pull_request.body, 'test-all') }}
      timezone: ${{ steps.changes.outputs.timezone == 'true' || contains(github.event.pull_request.body, 'test-timezone') || contains(github.event.pull_request.body, 'test-all') }}
      cli: ${{ steps.changes.outputs.cli == 'true' || contains(github.event.pull_request.body, 'test-cli') || contains(github.event.pull_request.body, 'test-all') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check for files changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          token: ${{ github.token }}
          filters: .github/file-filters.yml

  post-test-selection-comment:
    name: Post Test Selection Comment
    runs-on: depot-ubuntu-24.04-4
    needs: files-changed
    steps:
      - name: Post comment with test selection info
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const marker = '<!-- test-selection-comment -->';

            const tests = [
              {
                name: 'Preview Environment',
                selected: ${{ needs.files-changed.outputs.preview }},
                trigger: 'deploy-preview',
                description: 'Deploys a preview environment for testing'
              },
              {
                name: 'Frontend E2E Tests',
                selected: ${{ needs.files-changed.outputs.frontend }},
                trigger: 'test-frontend',
                description: 'Runs Cypress app tests'
              },
              {
                name: 'Backend API Tests',
                selected: ${{ needs.files-changed.outputs.backend }},
                trigger: 'test-backend',
                description: 'Runs Vitest API tests'
              },
              {
                name: 'Timezone Tests',
                selected: ${{ needs.files-changed.outputs.timezone }},
                trigger: 'test-timezone',
                description: 'Runs date/timezone E2E tests across multiple timezones'
              },
              {
                name: 'CLI Tests',
                selected: ${{ needs.files-changed.outputs.cli }},
                trigger: 'test-cli',
                description: 'Runs CLI integration and dbt version tests'
              }
            ];

            const selectedTests = tests.filter(t => t.selected);
            const unselectedTests = tests.filter(t => !t.selected);

            let body = `${marker}\n## 🧪 Test Selection\n\n`;

            if (selectedTests.length > 0) {
              body += `### ✅ Tests that will run\n`;
              body += `| Test | Description |\n|------|-------------|\n`;
              for (const test of selectedTests) {
                body += `| ${test.name} | ${test.description} |\n`;
              }
              body += '\n';
            }

            if (unselectedTests.length > 0) {
              body += `### ⏭️ Tests skipped (no relevant file changes detected)\n`;
              body += `| Test | How to trigger manually |\n|------|-------------------------|\n`;
              for (const test of unselectedTests) {
                body += `| ${test.name} | Add \`${test.trigger}\` to PR description |\n`;
              }
              body += '\n';
            }

            body += `> **Tip:** Add \`test-all\` to your PR description to run all tests.\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  preview:
    name: Deploy Preview
    runs-on: depot-ubuntu-24.04-4
    needs: files-changed
    if: needs.files-changed.outputs.preview == 'true'
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Context
        uses: okteto/context@5212ce5ebf9d3584bafd33f4a295a8521fc5abe7 # latest
        with:
          url: ${{ secrets.OKTETO_CONTEXT }}
          token: ${{ secrets.OKTETO_TOKEN }}

      - name: Create GitHub deployment
        id: deployment
        uses: chrnorm/deployment-action@500aa6a23c81ffa1acf71072aee3cfa2cc2e556a # v2
        with:
          token: ${{ secrets.CI_GITHUB_TOKEN }}
          initial-status: pending
          environment: pr-${{ github.event.number }}
          environment-url: https://lightdash-preview-pr-${{ github.event.number }}.lightdash.okteto.dev

      - name: Deploy preview environment
        id: deploy
        uses: okteto/deploy-preview@86c45b05007dbdd42a5c8c74372f7a5912608827 # latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: pr-${{ github.event.number }}
          timeout: 15m
          file: okteto.preview.yaml
          variables: SITE_URL=https://lightdash-preview-pr-${{ github.event.number }}.lightdash.okteto.dev

      - name: Set preview URL output
        run: echo "url=https://lightdash-preview-pr-${{ github.event.number }}.lightdash.okteto.dev" >> "$GITHUB_OUTPUT"

      - name: Update deployment status
        uses: chrnorm/deployment-status@6df8d036fd2fee9eb82936733953da1f8382b41e # v2
        with:
          token: ${{ secrets.CI_GITHUB_TOKEN }}
          state: success
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          environment-url: https://lightdash-preview-pr-${{ github.event.number }}.lightdash.okteto.dev

      - name: Comment PR with preview info
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const marker = '<!-- preview-environment-comment -->';
            const body = `${marker}
            ## Preview Environment

            🌐 **URL:** https://lightdash-preview-pr-${context.issue.number}.lightdash.okteto.dev

            📋 **Logs:** [View in GCP Console](https://console.cloud.google.com/logs/query;query=resource.labels.namespace_name%3D%22pr-${context.issue.number}%22;duration=PT30M?project=lightdash-previews)

            🔧 **SSH:** \`./scripts/okteto-ssh.sh ${context.issue.number}\`
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # ============================================================================
  # Stage 3: E2E and CLI tests (only after preview is up)
  # ============================================================================

  # Build cypress e2e image (only when E2E tests that use it will run)
  build-cypress-e2e-image:
    runs-on: depot-ubuntu-24.04-4
    needs: files-changed
    if: needs.files-changed.outputs.frontend == 'true' || needs.files-changed.outputs.timezone == 'true'
    name: Build E2E Image
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: GitHub Registry Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          file: ./packages/e2e/dockerfile
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/lightdash/lightdash-cypress-e2e:latest
          push: true

  api-tests:
    if: needs.files-changed.outputs.backend == 'true'
    timeout-minutes: 10
    runs-on: depot-ubuntu-24.04-4
    needs: [preview, files-changed]
    name: "E2E: API (Vitest)"
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Socket Firewall
        uses: socketdev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
      - name: Install packages
        run: sfw pnpm install --frozen-lockfile --prefer-offline
      - name: Build packages/common module
        run: pnpm common-build
      - name: Create BigQuery credentials file
        id: create-json
        uses: jsdaniell/create-json@b8e77fa01397ca39cc4a6198cc29a3be5481afef # v1.2.3
        with:
          name: "credentials.json"
          json: ${{ secrets.GCP_CREDENTIALS }}
          dir: "./packages/e2e/cypress/fixtures/"
      - name: Run API tests
        run: pnpm -F api-tests test:api
        env:
          SITE_URL: https://lightdash-preview-pr-${{ github.event.number }}.lightdash.okteto.dev
          PGHOST: ${{ secrets.PGHOST }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_PATH: ${{ secrets.DATABRICKS_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          TRINO_HOST: ${{ secrets.TRINO_HOST }}
          TRINO_PORT: ${{ secrets.TRINO_PORT }}
          TRINO_USER: ${{ secrets.TRINO_USER }}
          TRINO_PASSWORD: ${{ secrets.TRINO_PASSWORD }}
          TZ: "UTC"

  app-tests:
    if: needs.files-changed.outputs.frontend == 'true'
    timeout-minutes: 30
    runs-on: depot-ubuntu-24.04-4
    needs: [preview, files-changed, build-cypress-e2e-image]
    container:
      image: ghcr.io/lightdash/lightdash-cypress-e2e:latest
      options: --user 1001
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3, 4, 5]
    name: "E2E: App (${{ matrix.containers }}/${{ strategy.job-total }})"
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node, PNPM, and Cypress
        uses: ./.github/workflows/_setup_node_pnpm_cypress
      - name: Build packages/common module
        run: pnpm common-build
      - name: create-json
        id: create-json
        uses: jsdaniell/create-json@b8e77fa01397ca39cc4a6198cc29a3be5481afef # v1.2.3
        with:
          name: "credentials.json"
          json: ${{ secrets.GCP_CREDENTIALS }}
          dir: "./packages/e2e/cypress/fixtures/"
      - name: Run Cypress
        uses: cypress-io/github-action@783cb3f07983868532cabaedaa1e6c00ff4786a8 # v7
        with:
          install: false
          browser: firefox
          working-directory: packages/e2e
          config: "baseUrl=https://lightdash-preview-pr-${{ github.event.number }}.lightdash.okteto.dev,specPattern=cypress/e2e/app/**/*.cy.{js,jsx,ts,tsx},video=false"
        env:
          SPLIT: ${{ strategy.job-total }}
          SPLIT_INDEX: ${{ strategy.job-index }}
          CYPRESS_PGHOST: ${{ secrets.PGHOST }}
          CYPRESS_PGPASSWORD: ${{ secrets.PGPASSWORD }}
          CYPRESS_DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          CYPRESS_DATABRICKS_PATH: ${{ secrets.DATABRICKS_PATH }}
          CYPRESS_DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          CYPRESS_SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          CYPRESS_SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          CYPRESS_SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          CYPRESS_TRINO_HOST: ${{ secrets.TRINO_HOST }}
          CYPRESS_TRINO_PORT: ${{ secrets.TRINO_PORT }}
          CYPRESS_TRINO_USER: ${{ secrets.TRINO_USER }}
          CYPRESS_TRINO_PASSWORD: ${{ secrets.TRINO_PASSWORD }}
          TZ: "UTC"
          CYPRESS_TZ: "UTC"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: failure()
        with:
          name: cypress-screenshots-and-videos-${{ strategy.job-index }}
          path: |
            packages/e2e/cypress/screenshots
            packages/e2e/cypress/videos
          if-no-files-found: ignore

  timezone-tests:
    if: needs.files-changed.outputs.timezone == 'true'
    timeout-minutes: 30
    runs-on: depot-ubuntu-24.04-4
    needs: [preview, files-changed, build-cypress-e2e-image]
    container:
      image: ghcr.io/lightdash/lightdash-cypress-e2e:latest
      options: --user 1001
    strategy:
      fail-fast: false
      matrix:
        timezone: ["America/New_York", "Europe/Madrid", "Asia/Tokyo"]
    name: "E2E: Timezone (${{ matrix.timezone }})"
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node, PNPM, and Cypress
        uses: ./.github/workflows/_setup_node_pnpm_cypress
      - name: Build packages/common module
        run: pnpm common-build
      - name: create-json
        id: create-json
        uses: jsdaniell/create-json@b8e77fa01397ca39cc4a6198cc29a3be5481afef # v1.2.3
        with:
          name: "credentials.json"
          json: ${{ secrets.GCP_CREDENTIALS }}
          dir: "./packages/e2e/cypress/fixtures/"
      - name: Run Cypress
        uses: cypress-io/github-action@783cb3f07983868532cabaedaa1e6c00ff4786a8 # v7
        with:
          install: false
          browser: firefox
          working-directory: packages/e2e
          spec: cypress/e2e/app/dates.cy.ts
          config: "baseUrl=https://lightdash-preview-pr-${{ github.event.number }}.lightdash.okteto.dev,video=false"
        env:
          TZ: ${{ matrix.timezone }}
          CYPRESS_TZ: ${{ matrix.timezone }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: failure()
        with:
          name: cypress-screenshots-and-videos-timezone-${{ strategy.job-index }}
          path: |
            packages/e2e/cypress/screenshots
            packages/e2e/cypress/videos
          if-no-files-found: ignore

  # CLI tests without dbt
  cli-tests-without-dbt:
    if: needs.files-changed.outputs.cli == 'true'
    timeout-minutes: 30
    runs-on: depot-ubuntu-24.04-4
    needs: [preview, files-changed]
    name: "CLI: Without dbt"
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node, PNPM, and Cypress
        uses: ./.github/workflows/_setup_node_pnpm_cypress
      - name: Build packages/common module
        run: pnpm common-build
      - name: Build packages/warehouses module
        run: pnpm warehouses-build
      - name: Build and install packages/cli module
        run: cd packages/cli && pnpm build && sfw npm install -g
      - name: Test lightdash version
        run: |
          lightdash_version=$(lightdash --version)
          package_version="$(pnpm m ls --depth=-1 | grep '@lightdash/cli@' | sed -E 's/.*@lightdash\/cli@([0-9.]+).*/\1/')"
          if [ $package_version = $lightdash_version ]; then exit 0 ; else echo "Version mismatch"; exit 1; fi
      - name: Run Cypress
        uses: cypress-io/github-action@783cb3f07983868532cabaedaa1e6c00ff4786a8 # v7
        with:
          install: false
          working-directory: packages/e2e
          spec: cypress/cli/api,cypress/cli/yaml-only
          config: "baseUrl=https://lightdash-preview-pr-${{ github.event.number }}.lightdash.okteto.dev"

  # CLI tests with dbt
  cli-tests:
    if: needs.files-changed.outputs.cli == 'true'
    timeout-minutes: 30
    runs-on: depot-ubuntu-24.04-4
    needs: [preview, files-changed]
    name: "CLI: Integration"
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node, PNPM, and Cypress
        uses: ./.github/workflows/_setup_node_pnpm_cypress
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10.x"
      - run: pip install dbt-core~=1.9.0 dbt-postgres~=1.9.0
      - name: Seed DBT
        run: dbt seed --profiles-dir $PROFILES_DIR --project-dir $PROJECT_DIR --full-refresh
        env:
          PROJECT_DIR: "./examples/full-jaffle-shop-demo/dbt"
          PROFILES_DIR: "./examples/full-jaffle-shop-demo/profiles"
          PGHOST: ${{ secrets.PGHOST }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGPORT: 5432
          PGUSER: postgres
          PGDATABASE: postgres
          SEED_SCHEMA: jaffle_cli_tests_${{ github.run_id }}
      - name: Run DBT
        run: dbt run --profiles-dir $PROFILES_DIR --project-dir $PROJECT_DIR --full-refresh
        env:
          PROJECT_DIR: "./examples/full-jaffle-shop-demo/dbt"
          PROFILES_DIR: "./examples/full-jaffle-shop-demo/profiles"
          PGHOST: ${{ secrets.PGHOST }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGPORT: 5432
          PGUSER: postgres
          PGDATABASE: postgres
          SEED_SCHEMA: jaffle_cli_tests_${{ github.run_id }}
      - name: Build packages/common module
        run: pnpm common-build
      - name: Build packages/warehouses module
        run: pnpm warehouses-build
      - name: Build and install packages/cli module
        run: cd packages/cli && pnpm build && sfw npm install -g
      - name: Test lightdash version
        run: |
          lightdash_version=$(lightdash --version)
          package_version="$(pnpm m ls --depth=-1 | grep '@lightdash/cli@' | sed -E 's/.*@lightdash\/cli@([0-9.]+).*/\1/')"
          if [ $package_version = $lightdash_version ]; then exit 0 ; else echo "Version mismatch"; exit 1; fi
      - name: Run Cypress
        uses: cypress-io/github-action@783cb3f07983868532cabaedaa1e6c00ff4786a8 # v7
        with:
          install: false
          working-directory: packages/e2e
          spec: cypress/cli/integration/*
          config: "baseUrl=https://lightdash-preview-pr-${{ github.event.number }}.lightdash.okteto.dev"
        env:
          CYPRESS_PGHOST: ${{ secrets.PGHOST }}
          CYPRESS_PGPASSWORD: ${{ secrets.PGPASSWORD }}
          CYPRESS_SEED_SCHEMA: jaffle_cli_tests_${{ github.run_id }}

  # CLI dbt version tests
  cli-dbt-tests:
    if: needs.files-changed.outputs.cli == 'true'
    timeout-minutes: 30
    runs-on: depot-ubuntu-24.04-4
    needs: [preview, files-changed]
    strategy:
      fail-fast: false
      matrix:
        dbt: ["1.10", "1.11"]
    name: "CLI: dbt ${{ matrix.dbt }}"
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node, PNPM, and Cypress
        uses: ./.github/workflows/_setup_node_pnpm_cypress
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10.x"
      - run: |
          if [ "${{ matrix.dbt }}" = "1.11" ]; then
            pip install dbt-core~=${{ matrix.dbt }}.0 dbt-postgres~=1.10.0
          else
            pip install dbt-core~=${{ matrix.dbt }}.0 dbt-postgres~=${{ matrix.dbt }}.0
          fi
      - name: Seed DBT
        run: dbt seed --profiles-dir $PROFILES_DIR --project-dir $PROJECT_DIR --full-refresh
        env:
          PROJECT_DIR: "./examples/full-jaffle-shop-demo/dbt"
          PROFILES_DIR: "./examples/full-jaffle-shop-demo/profiles"
          PGHOST: ${{ secrets.PGHOST }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGPORT: 5432
          PGUSER: postgres
          PGDATABASE: postgres
          SEED_SCHEMA: jaffle_dbt_tests_${{ github.run_id }}_${{ strategy.job-index }}
      - name: Run DBT
        run: dbt run --profiles-dir $PROFILES_DIR --project-dir $PROJECT_DIR --full-refresh
        env:
          PROJECT_DIR: "./examples/full-jaffle-shop-demo/dbt"
          PROFILES_DIR: "./examples/full-jaffle-shop-demo/profiles"
          PGHOST: ${{ secrets.PGHOST }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGPORT: 5432
          PGUSER: postgres
          PGDATABASE: postgres
          SEED_SCHEMA: jaffle_dbt_tests_${{ github.run_id }}_${{ strategy.job-index }}
      - name: Build packages/common module
        run: pnpm common-build
      - name: Build packages/warehouses module
        run: pnpm warehouses-build
      - name: Build and install packages/cli module
        run: cd packages/cli && pnpm build && sfw npm install -g
      - name: Test lightdash version
        run: |
          lightdash_version=$(lightdash --version)
          package_version="$(pnpm m ls --depth=-1 | grep '@lightdash/cli@' | sed -E 's/.*@lightdash\/cli@([0-9.]+).*/\1/')"
          if [ $package_version = $lightdash_version ]; then exit 0 ; else echo "Version mismatch"; exit 1; fi
      - name: Run Cypress
        uses: cypress-io/github-action@783cb3f07983868532cabaedaa1e6c00ff4786a8 # v7
        with:
          install: false
          working-directory: packages/e2e
          spec: cypress/cli/dbt/*
          config: "baseUrl=https://lightdash-preview-pr-${{ github.event.number }}.lightdash.okteto.dev"
        env:
          CYPRESS_PGHOST: ${{ secrets.PGHOST }}
          CYPRESS_PGPASSWORD: ${{ secrets.PGPASSWORD }}
          CYPRESS_SEED_SCHEMA: jaffle_dbt_tests_${{ github.run_id }}_${{ strategy.job-index }}

  # Cleanup job to drop all schemas created during CLI tests
  cleanup-schemas:
    if: always() && needs.files-changed.outputs.cli == 'true'
    runs-on: depot-ubuntu-24.04-4
    needs: [files-changed, cli-tests-without-dbt, cli-tests, cli-dbt-tests]
    name: Cleanup test schemas
    steps:
      - name: Drop test schemas
        run: |
          PATTERN="^(jaffle_cli_tests_${{ github.run_id }}|jaffle_dbt_tests_${{ github.run_id }}_[0-9]+)$"
          SCHEMAS=$(psql -t -c "SELECT schema_name FROM information_schema.schemata WHERE schema_name ~ '$PATTERN';")
          for schema in $SCHEMAS; do
              if [ -n "$schema" ]; then
                  echo "Dropping schema: $schema"
                  psql -c "DROP SCHEMA IF EXISTS \"$schema\" CASCADE;"
              fi
          done
          echo "Schema cleanup completed"
        env:
          PGHOST: ${{ secrets.PGHOST }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGPORT: 5432
          PGUSER: postgres
          PGDATABASE: postgres
