name: Release to DockerHub, GCP, Homebrew

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: lightdash/lightdash

jobs:
  # ============================================================================
  # Job 1: Build and push Docker images with multiple tags
  # ============================================================================
  build-and-push-images:
    name: Build and Push Images
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.CI_GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      # ========================================
      # Set up version and timestamp for tagging
      # ========================================
      - name: Set version and timestamp
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name || inputs.tag }}"
          TIMESTAMP=$(date +%Y.%m.%d-%H.%M.%S)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Timestamp: $TIMESTAMP"

      # ========================================
      # Generate Docker metadata labels
      # ========================================
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=raw,value=latest

      # ========================================
      # Set up Depot CLI
      # ========================================
      - name: Set up Depot CLI
        uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1

      # ========================================
      # Login to Docker Hub
      # ========================================
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ========================================
      # Login to GCP Artifact Registry (all regions)
      # ========================================
      - id: 'auth'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS_IMAGE_DEPLOY }}'

      - name: 'Set up Cloud SDK'
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          version: '>= 381.0.0'

      - name: Configure Docker authentication for GCP regions
        run: |
          gcloud auth configure-docker us-docker.pkg.dev
          gcloud auth configure-docker europe-docker.pkg.dev
          gcloud auth configure-docker europe-west2-docker.pkg.dev

      # ========================================
      # Build and push to all registries at once
      # ========================================
      - name: Build and push to Docker Hub and GCP
        id: build-and-push
        uses: depot/build-push-action@5f3b3c2e5a00f0093de47f657aeaefcedff27d18 # v1
        with:
          project: bgbbt3d0kc # depot project id
          token: ${{ secrets.DEPOT_PROJECT_TOKEN }}
          file: dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            lightdash/lightdash:${{ steps.version.outputs.version }}
            lightdash/lightdash:latest
            us-docker.pkg.dev/lightdash-containers/lightdash/lightdash:${{ steps.version.outputs.version }}-commercial
            us-docker.pkg.dev/lightdash-containers/lightdash/lightdash:beta
            us-docker.pkg.dev/lightdash-containers/lightdash/lightdash:${{ steps.version.outputs.timestamp }}
            europe-docker.pkg.dev/lightdash-containers/lightdash/lightdash:${{ steps.version.outputs.version }}-commercial
            europe-docker.pkg.dev/lightdash-containers/lightdash/lightdash:beta
            europe-docker.pkg.dev/lightdash-containers/lightdash/lightdash:${{ steps.version.outputs.timestamp }}
            europe-west2-docker.pkg.dev/lightdash-containers/lightdash/lightdash:${{ steps.version.outputs.version }}-commercial
            europe-west2-docker.pkg.dev/lightdash-containers/lightdash/lightdash:beta
            europe-west2-docker.pkg.dev/lightdash-containers/lightdash/lightdash:${{ steps.version.outputs.timestamp }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=lightdash
            SENTRY_RELEASE_VERSION=${{ steps.version.outputs.version }}
            SENTRY_FRONTEND_PROJECT=lightdash-frontend
            SENTRY_BACKEND_PROJECT=lightdash-backend
            SENTRY_ENVIRONMENT=cloud_beta

  # ============================================================================
  # Job 2: QA Blast Radius
  # ============================================================================
  qa-blast-radius:
    name: Generate QA Blast Radius
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Find previous release tag
        id: prev-tag
        run: |
          CURRENT_TAG="${{ github.event.release.tag_name }}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)
          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ]; then
            echo "No previous tag found, checking commit count for safe fallback"
            COMMIT_COUNT=$(git rev-list --count HEAD)
            if [ "$COMMIT_COUNT" -lt 20 ]; then
              echo "base=HEAD~$((COMMIT_COUNT-1))" >> $GITHUB_OUTPUT
            else
              echo "base=HEAD~20" >> $GITHUB_OUTPUT
            fi
          else
            echo "Diffing $CURRENT_TAG against $PREVIOUS_TAG"
            echo "base=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Build code graph and detect changes
        run: |
          pip install code-review-graph==2.3.1
          code-review-graph build --skip-postprocess
          code-review-graph detect-changes --base ${{ steps.prev-tag.outputs.base }} > blast-radius.json

      - name: Upload blast radius to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            blast-radius.json \
            --clobber

  # ============================================================================
  # Job 3: CLI Release Binaries
  # ============================================================================
  check-cli-changes:
    name: Check if CLI files changed
    runs-on: depot-ubuntu-24.04-4
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Check for CLI-related changes
        id: check
        run: |
          # For manual triggers, always build
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger - building binaries"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get the current and previous tags
          CURRENT_TAG="${{ github.event.release.tag_name }}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)

          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ]; then
            echo "No previous tag found, building binaries"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Comparing $PREVIOUS_TAG to $CURRENT_TAG"

          # Check if the CLI or its runtime dependencies changed
          CHANGED_FILES=$(git diff --name-only "$PREVIOUS_TAG" "$CURRENT_TAG" | grep -E '^(packages/cli/|packages/common/|packages/warehouses/|package.json|pnpm-lock.yaml|pnpm-workspace.yaml)' || true)

          if [ -n "$CHANGED_FILES" ]; then
            echo "CLI files changed:"
            echo "$CHANGED_FILES"
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "No CLI files changed, skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build-macos-binaries:
    name: Build macOS CLI Binaries
    needs: check-cli-changes
    if: needs.check-cli-changes.outputs.should_build == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Socket Firewall
        uses: socketdev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-cli-binaries-v2-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        # Force reinstall so pnpm includes optional DuckDB native bindings
        # needed to build both macOS pkg targets from a single runner.
        run: sfw pnpm install --filter @lightdash/cli --filter @lightdash/common --filter @lightdash/warehouses --frozen-lockfile --prefer-offline --prod=false --force

      - name: Cache common build
        id: cache-common
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: packages/common/dist
          key: ${{ runner.os }}-common-build-${{ hashFiles('packages/common/src/**', 'packages/common/tsconfig*.json') }}

      - name: Build common package
        if: steps.cache-common.outputs.cache-hit != 'true'
        run: pnpm common-build

      - name: Cache warehouses build
        id: cache-warehouses
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: packages/warehouses/dist
          key: ${{ runner.os }}-warehouses-build-${{ hashFiles('packages/warehouses/src/**', 'packages/warehouses/tsconfig*.json', 'packages/common/src/**') }}

      - name: Build warehouses package
        if: steps.cache-warehouses.outputs.cache-hit != 'true'
        run: pnpm warehouses-build

      - name: Build CLI package
        working-directory: packages/cli
        run: pnpm build

      - name: Import Code Signing Certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Set key partition list
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # Clean up certificate file
          rm -f "$CERTIFICATE_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Store Notarization Credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "notary-profile" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Build, Sign and Notarize macOS Binaries
        working-directory: packages/cli
        env:
          DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          NOTARY_KEYCHAIN_PROFILE: "notary-profile"
        run: |
          ./scripts/build-binaries.sh --sign --archive --mac-only

      - name: Upload Binaries to Release
        working-directory: packages/cli
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"

          echo "Uploading binaries to release $TAG..."

          # Upload archives and checksums
          gh release upload "$TAG" \
            lightdash-cli-*.tar.gz \
            checksums-macos-sha256.txt \
            --clobber

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

  update-homebrew-formula:
    name: Update Homebrew Formula
    needs: build-macos-binaries
    runs-on: depot-ubuntu-24.04-4
    steps:
      - name: Checkout Homebrew tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: lightdash/homebrew-lightdash
          token: ${{ secrets.CI_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Get release info and update formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"  # Remove 'v' prefix if present

          echo "Updating Homebrew formula for version $VERSION"

          # Download the checksums file from the release
          gh release download "$TAG" \
            --repo lightdash/lightdash \
            --pattern "checksums-macos-sha256.txt" \
            --dir .

          # Extract SHA256 checksums
          ARM64_SHA=$(grep "macos-arm64" checksums-macos-sha256.txt | awk '{print $1}')
          X64_SHA=$(grep "macos-x64" checksums-macos-sha256.txt | awk '{print $1}')

          if [ -z "$ARM64_SHA" ] || [ -z "$X64_SHA" ]; then
            echo "Error: Failed to extract SHA256 checksums"
            exit 1
          fi

          echo "ARM64 SHA: $ARM64_SHA"
          echo "X64 SHA: $X64_SHA"

          # Update the formula
          FORMULA_PATH="homebrew-tap/Formula/lightdash.rb"

          # Export for Ruby script
          export VERSION TAG ARM64_SHA X64_SHA

          ruby -i -pe '
            version = ENV["VERSION"]
            tag = ENV["TAG"]
            arm64_sha = ENV["ARM64_SHA"]
            x64_sha = ENV["X64_SHA"]

            # Update version line
            if /^\s*version\s+"/
              gsub(/version\s+"[^"]+"/, "version \"#{version}\"")
            end

            # Update ARM64 URL (in on_arm block)
            if /on_arm/ .. /end/ and /url\s+".*macos-arm64/
              gsub(/url\s+"[^"]+"/, "url \"https://github.com/lightdash/lightdash/releases/download/#{tag}/lightdash-cli-#{tag}-macos-arm64.tar.gz\"")
            end

            # Update ARM64 SHA (line after ARM64 URL)
            if $_.include?("macos-arm64")
              @next_sha_is_arm64 = true
            elsif @next_sha_is_arm64 and /sha256/
              gsub(/sha256\s+"[^"]+"/, "sha256 \"#{arm64_sha}\"")
              @next_sha_is_arm64 = false
            end

            # Update x64 URL (in on_intel block)
            if /on_intel/ .. /end/ and /url\s+".*macos-x64/
              gsub(/url\s+"[^"]+"/, "url \"https://github.com/lightdash/lightdash/releases/download/#{tag}/lightdash-cli-#{tag}-macos-x64.tar.gz\"")
            end

            # Update x64 SHA (line after x64 URL)
            if $_.include?("macos-x64") and @next_sha_is_x64 = true
            elsif @next_sha_is_x64 and /sha256/
              gsub(/sha256\s+"[^"]+"/, "sha256 \"#{x64_sha}\"")
              @next_sha_is_x64 = false
            end
          ' "$FORMULA_PATH"

          echo "Updated formula:"
          cat "$FORMULA_PATH"

      - name: Commit and push changes
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/lightdash.rb
          git commit -m "Update lightdash to $VERSION"
          git push origin main

  # ============================================================================
  # Job 4: Data App E2B template — publish a tag matching this release
  # ============================================================================
  # Two paths:
  #   build  — full E2B template rebuild when sandboxes/data-apps/** or
  #            packages/query-sdk/** changed since the previous release.
  #   retag  — fast path that re-tags the existing :latest build with the new
  #            release version, so every released version still has a pinned
  #            tag without burning E2B build minutes on a no-op rebuild.
  data-app-template-resolve:
    name: Resolve E2B template build action
    runs-on: depot-ubuntu-24.04-4
    outputs:
      action: ${{ steps.plan.outputs.action }}
      primary_tag: ${{ steps.plan.outputs.primary_tag }}
      source_tag: ${{ steps.plan.outputs.source_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Plan build
        id: plan
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          PRIMARY_TAG="$RELEASE_TAG"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -A1 "^${RELEASE_TAG}$" | tail -1 || true)
          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "$RELEASE_TAG" ]; then
            echo "No previous tag found — performing full build"
            ACTION="build"
            SOURCE_TAG=""
          else
            CHANGED=$(git diff --name-only "$PREVIOUS_TAG" "$RELEASE_TAG" -- 'sandboxes/data-apps/' 'packages/query-sdk/' || true)
            if [ -n "$CHANGED" ]; then
              echo "Template/SDK changed since $PREVIOUS_TAG — performing full build"
              echo "$CHANGED"
              ACTION="build"
              SOURCE_TAG=""
            else
              echo "No template/SDK changes since $PREVIOUS_TAG — re-tagging :latest"
              ACTION="retag"
              SOURCE_TAG="latest"
            fi
          fi
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "primary_tag=$PRIMARY_TAG" >> "$GITHUB_OUTPUT"
          echo "source_tag=$SOURCE_TAG" >> "$GITHUB_OUTPUT"

  data-app-template-build:
    name: Build E2B template (${{ matrix.region }})
    needs: data-app-template-resolve
    if: needs.data-app-template-resolve.outputs.action == 'build'
    runs-on: depot-ubuntu-24.04-4
    strategy:
      fail-fast: false
      matrix:
        region: [us, eu]
    env:
      E2B_API_KEY: ${{ matrix.region == 'eu' && secrets.E2B_API_KEY_EU || secrets.E2B_API_KEY }}
      E2B_DOMAIN: ${{ matrix.region == 'eu' && 'e2b-juliett.dev' || '' }}
      E2B_TEMPLATE_NAME: lightdash-data-app
      E2B_TEMPLATE_TAG: ${{ needs.data-app-template-resolve.outputs.primary_tag }}
      E2B_TEMPLATE_EXTRA_TAGS: latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Socket Firewall
        uses: socketdev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install root deps
        run: sfw pnpm install --frozen-lockfile --prefer-offline

      - name: Install sandbox deps
        working-directory: sandboxes/data-apps
        run: sfw pnpm install --frozen-lockfile --prefer-offline

      - name: Build & publish E2B template
        working-directory: sandboxes/data-apps
        run: pnpm run build

  data-app-template-retag:
    name: Re-tag existing E2B build (${{ matrix.region }})
    needs: data-app-template-resolve
    if: needs.data-app-template-resolve.outputs.action == 'retag'
    runs-on: depot-ubuntu-24.04-4
    strategy:
      fail-fast: false
      matrix:
        region: [us, eu]
    env:
      E2B_API_KEY: ${{ matrix.region == 'eu' && secrets.E2B_API_KEY_EU || secrets.E2B_API_KEY }}
      E2B_DOMAIN: ${{ matrix.region == 'eu' && 'e2b-juliett.dev' || '' }}
      E2B_TEMPLATE_NAME: lightdash-data-app
      E2B_TEMPLATE_TAG: ${{ needs.data-app-template-resolve.outputs.primary_tag }}
      E2B_TEMPLATE_SOURCE_TAG: ${{ needs.data-app-template-resolve.outputs.source_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Socket Firewall
        uses: socketdev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'

      - name: Install sandbox deps
        working-directory: sandboxes/data-apps
        run: sfw pnpm install --frozen-lockfile --prefer-offline

      - name: Re-tag :latest build with release version
        working-directory: sandboxes/data-apps
        run: pnpm exec tsx assign-tag.ts
