name: Build & Release
on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: depot-ubuntu-24.04-8
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_API: https://cache.depot.dev
      NODE_OPTIONS: '--max-old-space-size=8192'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - name: Install packages
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Build all packages
        run: pnpm build

  release:
    runs-on: ubuntu-latest
    needs: build-and-test
    concurrency: ${{ github.ref }}
    permissions:
      contents: read
      id-token: write  # Required for OIDC authentication with npm
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CI_GITHUB_TOKEN }}
          persist-credentials: false

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --prod=false

      - name: Semantic Release
        # Config is on release.config.js
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          HUSKY: 0
          GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
        with:
          semantic_version: 19
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/exec@6
            @semantic-release/git@10
            @semantic-release/github@8

  # ============================================================================
  # Post-release: Docker images, CLI binaries, publish, Homebrew
  # Only runs when semantic-release created a new release (draft)
  # ============================================================================

  docker:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/_docker.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit

  check-cli-changes:
    name: Check if CLI files changed
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: depot-ubuntu-24.04-4
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.tag }}

      - name: Check for CLI-related changes
        id: check
        run: |
          CURRENT_TAG="${{ needs.release.outputs.tag }}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)

          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ]; then
            echo "No previous tag found, building binaries"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Comparing $PREVIOUS_TAG to $CURRENT_TAG"

          # Check if the CLI or its runtime dependencies changed
          CHANGED_FILES=$(git diff --name-only "$PREVIOUS_TAG" "$CURRENT_TAG" | grep -E '^(packages/cli/|packages/common/|packages/warehouses/|package.json|pnpm-lock.yaml|pnpm-workspace.yaml)' || true)

          if [ -n "$CHANGED_FILES" ]; then
            echo "CLI files changed:"
            echo "$CHANGED_FILES"
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "No CLI files changed, skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  cli-binaries:
    needs: [release, check-cli-changes]
    if: needs.check-cli-changes.outputs.should_build == 'true'
    uses: ./.github/workflows/_cli-binaries.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit

  publish-release:
    name: Publish Release
    needs: [release, docker, cli-binaries, check-cli-changes]
    if: |
      always() &&
      needs.docker.result == 'success' &&
      (needs.cli-binaries.result == 'success' || needs.cli-binaries.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        # Uses CI_GITHUB_TOKEN (PAT) so that publishing fires the
        # release:published event for downstream integrations.
        # GITHUB_TOKEN would not trigger other workflows.
        env:
          GH_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --draft=false

  homebrew:
    needs: [release, publish-release, check-cli-changes]
    if: |
      needs.check-cli-changes.outputs.should_build == 'true' &&
      needs.publish-release.result == 'success'
    uses: ./.github/workflows/_homebrew.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit
