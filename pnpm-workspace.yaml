packages:
  - 'packages/*'
  - 'packages/frontend/sdk'
  - 'packages/backend/src/ee/services/McpService/mcp-chart-app'

minimumReleaseAge: 4320 # 3 days — supply chain protection (matches .npmrc min-release-age)
minimumReleaseAgeExclude:
  # Renovate security update: hono@4.12.18 || 4.12.21
  - hono@4.12.18 || 4.12.21
  # Renovate security update: nunjucks@3.2.4
  - nunjucks@3.2.4
  # Renovate security update: next@16.2.6
  - next@16.2.6
  # Renovate security update: qs@6.14.2 || 6.15.2
  - qs@6.14.2 || 6.15.2
  # Renovate security update: postcss@8.5.10
  - postcss@8.5.10
  # Renovate security update: i18next-http-backend@3.0.5
  - i18next-http-backend@3.0.5
  # Renovate security update: simple-git@3.36.0
  - simple-git@3.36.0
  # Renovate security update: dompurify@3.4.0
  - dompurify@3.4.0
  # Renovate security update: yaml@2.8.3
  - yaml@2.8.3
  # Renovate security update: systeminformation@5.31.6
  - systeminformation@5.31.6
  # Renovate security update: basic-ftp@5.3.1
  - basic-ftp@5.3.1
  # Renovate security update: uuid@11.1.1
  - uuid@11.1.1
  # Renovate security update: pm2@7.0.0
  - pm2@7.0.0
  # Renovate security update: sanitize-html@2.17.4
  - sanitize-html@2.17.4
  # Renovate security update: nodemailer@8.0.5
  - nodemailer@8.0.5
  # Renovate security update: @tiptap/extension-link@2.10.4
  - "@tiptap/extension-link@2.10.4"
  # Renovate security update: @node-oauth/oauth2-server@5.3.0
  - "@node-oauth/oauth2-server@5.3.0"
  # Renovate security update: turbo@2.9.14
  - turbo@2.9.14
  # Renovate security update: liquidjs@10.26.0
  - liquidjs@10.26.0
  # Renovate security update: axios@1.16.0
  - axios@1.16.0
  # Renovate security update: form-data@4.0.6 || 3.0.5
  - form-data@4.0.6 || 3.0.5
  # Renovate security update: js-yaml@4.2.0
  - js-yaml@4.2.0
  # Renovate security update: vite@7.3.5
  - vite@7.3.5
  # Renovate security update: undici@6.27.0
  - undici@6.27.0

# Dependency lifecycle scripts (preinstall/install/postinstall) are a supply-chain
# attack/breakage vector — they also run on `npm install` for downstream consumers
# of our published packages (e.g. @lightdash/cli). pnpm blocks them by default;
# strictDepBuilds makes `pnpm install` FAIL (instead of warn) when a dependency has
# a build script that isn't reviewed in one of the two lists below. This blocks
# un-vetted install scripts from landing in CI.
# Note: in pnpm 11 these three settings are replaced by a single `allowBuilds` map.
strictDepBuilds: true

# Packages allowed to run their build scripts (native addons we depend on).
onlyBuiltDependencies:
  - '@sentry-internal/node-cpu-profiler'
  - '@sentry/cli'
  - '@swc/core'
  - bcrypt
  - canvas
  - core-js
  - core-js-pure
  - cpu-features
  - cypress
  - duckdb
  - esbuild
  - lz4
  - msgpackr-extract
  - protobufjs
  - sharp
  - ssh2

# Packages that ship build scripts we intentionally do NOT run. Each entry must
# explain why skipping the script is safe.
ignoredBuiltDependencies:
  # Optional native Zstandard addon, pulled in transitively via just-bash → backend.
  # Not compiled; the backend runs without the native build.
  - '@mongodb-js/zstd'
  # Optional native liblzma/XZ addon, pulled in transitively via just-bash → backend.
  # Not compiled; the backend runs without the native build.
  - node-liblzma

packageExtensions:
  '@mastra/schema-compat@0.11.2':
    peerDependenciesMeta:
      ai:
        optional: true
