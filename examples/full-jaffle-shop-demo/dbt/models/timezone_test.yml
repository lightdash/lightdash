version: 2

models:
  - name: timezone_test
    description: >
      Synthetic dataset for testing data timezone (warehouse session timezone) behavior.
      Contains 10 events with timestamptz values at specific UTC hours near midnight
      boundaries. When the warehouse session timezone is changed via the dataTimezone
      credential setting, DATE_TRUNC day boundaries shift, causing events to fall into
      different days and producing different per-day counts.

      This model is used by the dataTimezone API tests to verify that:
      (1) setting dataTimezone changes query results for timestamptz columns,
      (2) filters using date literals are interpreted in the session timezone, and
      (3) the EnableTimezoneSupport feature flag gates the behavior.
    meta:
      group_label: timezones
    columns:
      - name: event_id
        description: Unique event identifier (1-10)
        meta:
          dimension:
            type: number
      - name: event_timestamp
        description: >
          Timezone-aware event timestamp (timestamptz). All 10 events are stored
          with explicit UTC offsets (+00). Events 1-4 fall between 02:00-10:00 UTC
          and events 5-6 between 12:00-18:00 UTC on Jan 15. Events 7-8 are early
          UTC on Jan 16 (03:00-08:00) and 9-10 are mid-UTC on Jan 16 (12:00-18:00).

          Expected per-day counts when grouped by DATE_TRUNC('day'):
            - UTC (no dataTimezone): Jan 15 = 6, Jan 16 = 4
            - Pacific/Pago_Pago (UTC-11): Jan 14 = 4, Jan 15 = 4, Jan 16 = 2

          Expected counts with "equals 2024-01-15" filter:
            - UTC: 6
            - Pacific/Pago_Pago: 4
        meta:
          dimension:
            type: timestamp
          metrics:
            count:
              type: count
              description: Total number of events
      - name: category
        description: >
          Classifies events by their UTC time of day. "early_utc" events
          (02:00-10:00 UTC) shift to the previous day in negative-offset
          timezones like Pacific/Pago_Pago. "mid_utc" events (12:00-18:00 UTC)
          remain on the same calendar day in most timezones.
        meta:
          dimension:
            type: string
